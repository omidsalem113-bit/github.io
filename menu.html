<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>امید | منو</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@200;300;400;600&family=Markazi+Text:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #111;
      --ink-mid: #444;
      --ink-soft: #888;
      --paper: #faf9f7;
      --paper-2: #f3f0eb;
      --gold: #b8933a;
      --gold-pale: #f5edd8;
      --border: #e2ddd6;
      --ff-title: 'Markazi Text', serif;
      --ff-body: 'Vazirmatn', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--ff-body);
      font-weight: 300;
      min-height: 100vh;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 60px;
      border-bottom: 1px solid var(--border);
      background: var(--paper);
    }

    .topbar-brand {
      font-family: var(--ff-title);
      font-size: 1.4rem;
      color: var(--ink);
      text-decoration: none;
    }

    .topbar-brand span { color: var(--gold); }

    .back-btn {
      font-size: 0.82rem;
      color: var(--ink-soft);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.2s;
    }

    .back-btn:hover { color: var(--gold); }

    /* MENU */
    .menu {
      max-width: 500px;
      margin: 0 auto;
      padding: 3rem 2rem 4rem;
    }

    .menu-eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 2.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .menu-eyebrow::before {
      content: '';
      display: block;
      width: 24px;
      height: 1px;
      background: var(--gold);
    }

    /* SECTION */
    .menu-section {
      margin-bottom: 2.5rem;
    }

    .menu-section-title {
      font-family: var(--ff-title);
      font-size: 1.9rem;
      color: var(--ink);
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: color 0.2s;
    }

    .menu-section-title:hover { color: var(--gold); }

    .menu-section-title .chevron {
      font-size: 1rem;
      color: var(--ink-soft);
      transition: transform 0.25s;
      font-family: var(--ff-body);
    }

    .menu-section-title.open .chevron { transform: rotate(90deg); }

    /* SUB ITEMS */
    .menu-sub {
      display: none;
      padding: 0.5rem 0 0.5rem 1rem;
      border-right: 2px solid var(--gold-pale);
      margin-top: 0.5rem;
    }

    .menu-sub.open { display: block; }

    .menu-sub a {
      display: block;
      padding: 0.6rem 0.5rem;
      font-size: 0.92rem;
      color: var(--ink-mid);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: color 0.2s, padding-right 0.2s;
    }

    .menu-sub a:last-child { border-bottom: none; }

    .menu-sub a:hover {
      color: var(--gold);
      padding-right: 1rem;
    }

    /* SIMPLE LINKS */
    .menu-link {
      display: block;
      font-family: var(--ff-title);
      font-size: 1.9rem;
      color: var(--ink);
      text-decoration: none;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2.5rem;
      transition: color 0.2s;
    }

    .menu-link:hover { color: var(--gold); }
  </style>
</head>
<body>

  <div class="topbar">
    <a class="topbar-brand" href="index.html">امید<span>.</span></a>
    <a class="back-btn" href="index.html">← بازگشت</a>
  </div>

  <div class="menu">
    <div class="menu-eyebrow">فهرست</div>

    <!-- کتاب‌ها -->
    <div class="menu-section">
      <div class="menu-section-title" id="books-title">
        کتاب‌ها
        <span class="chevron">›</span>
      </div>
      <div class="menu-sub" id="books-sub">
        <a href="books.html">کتاب‌هایی که خوندم</a>
        <a href="#">کتاب‌هایی که خوندم و دوستشون داشتم</a>
        <a href="#">کتاب‌هایی که خوندم و دوستشون نداشتم</a>
        <a href="#">کتاب‌هایی که می‌خوام بخونم</a>
      </div>
    </div>

    <a class="menu-link" href="#">جملات</a>
    <a class="menu-link" href="#">شعر</a>
    <a class="menu-link" href="#">موسیقی</a>
    <a class="menu-link" href="#">درباره من</a>
  </div>

  <script>
    const booksTitle = document.getElementById('books-title');
    const booksSub = document.getElementById('books-sub');

    booksTitle.addEventListener('click', function() {
      booksSub.classList.toggle('open');
      this.classList.toggle('open');
    });
  </script>

</body>
</html>
